workflows:
  build-all-5-apps:
    name: Build All 5 Bharamputra Apps
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android-signing
      vars:
        PACKAGE_NAME: "com.example.digitalindia"
      node: latest
    triggering:
      events:
        - push
      branch_patterns:
        - target: 'main'
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build All 5 APKs (Flavors)
        script: |
          ./gradlew assembleMainAppRelease \
                    assembleMusicAppRelease \
                    assembleChatAppRelease \
                    assembleAdminAppRelease \
                    assembleAnalyticsAppRelease
    artifacts:
      - app/build/outputs/apk/*/*/*.apk
    publishing:
      email:
        recipients:
          - dheerajbarak00@gmail.com
        notify:
          success: true
          failure: true
